name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333

    env:
      # Postgres для интеграционных тестов поднимается динамически через
      # testcontainers (Docker уже доступен на ubuntu-latest), эти
      # переменные нужны только чтобы `Settings()` (app/core/settings.py)
      # сконструировался при импорте — реального подключения для
      # unit/api-тестов не требуется (`AsyncEngine` создаётся лениво).
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ci-postgres-password
      POSTGRES_NAME: vera_rag_ci
      SECRET_KEY: ci-secret-key
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: ci-admin-password
      API_KEY: ci-api-key
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Установка зависимостей
        run: pip install -r requirements-dev.txt

      - name: Линтер (ruff)
        run: ruff check .

      - name: Тесты (unit + api + integration)
        run: pytest tests/ -v
