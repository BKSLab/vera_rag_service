[loggers]
keys=root,vera_rag_service

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_vera_rag_service]
level=INFO
handlers=consoleHandler
qualname=vera_rag_service
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter

[formatter_simpleFormatter]
; LOG-1 (AUDIT_VERIFICATION_AND_IMPLEMENTATION_PLAN.md) — структурированный
; (JSON) формат вместо неструктурированного текста с эмодзи: можно
; парсить/индексировать программно (Loki/ELK/CloudWatch и т.п.), не только
; читать глазами в консоли разработчика. `python-json-logger`.
class=pythonjsonlogger.json.JsonFormatter
format=%(asctime)s %(name)s %(levelname)s %(funcName)s %(request_id)s %(message)s
