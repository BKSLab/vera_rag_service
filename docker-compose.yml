version: '3.7'

volumes:
  pg_vera_rag_data:
  qdrant_data:

services:
  db:
    container_name: vera_rag_db
    image: postgres:16-alpine3.19
    env_file: .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_vera_rag_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  qdrant:
    container_name: vera_rag_qdrant
    image: qdrant/qdrant:v1.12.4
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    deploy:
      resources:
        limits:
          memory: 4GB

  rag_service:
    container_name: vera_rag_service
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      QDRANT_URL: http://qdrant:6333
      PHOENIX_OTLP_ENDPOINT: http://host.docker.internal:6006/v1/traces
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-vera-local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    command: bash entrypoint.sh
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          memory: 2GB
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
