version: '3.7'

volumes:
  pg_vera_rag_data:
  qdrant_data:

services:
  db:
    container_name: vera_rag_db
    image: postgres:16-alpine3.19
    env_file: .env
    restart: always
    volumes:
      - pg_vera_rag_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  qdrant:
    container_name: vera_rag_qdrant
    image: qdrant/qdrant:v1.12.4
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    deploy:
      resources:
        limits:
          memory: 4GB

  rag_service:
    container_name: vera_rag_service
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
      QDRANT_URL: http://qdrant:6333
    restart: on-failure
    command: bash entrypoint.sh
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          memory: 2GB
    depends_on:
      - db
      - qdrant
