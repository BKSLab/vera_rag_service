version: '3.7'

volumes:
  pg_vera_rag_data:
  qdrant_data:

services:
  db:
    container_name: vera_rag_db
    image: postgres:16-alpine3.19
    env_file: .env
    restart: always
    volumes:
      - pg_vera_rag_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  qdrant:
    container_name: vera_rag_qdrant
    image: qdrant/qdrant:v1.12.4
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    deploy:
      resources:
        limits:
          # QD-2 (AUDIT_VERIFICATION_AND_IMPLEMENTATION_PLAN.md) — раньше у
          # Qdrant не было лимита памяти вообще (лимит 2GB ниже относится
          # только к rag_service) — без него контролируемый OOM в
          # контейнере при превышении заменялся бы риском для всего хоста.
          # 4GB — с запасом по математике плана для масштаба ~100К чанков
          # (раздел "Найденные проблемы", QD-2/QD-4); пересмотреть при
          # росте корпуса на порядок.
          memory: 4GB

  rag_service:
    container_name: vera_rag_service
    build: .
    env_file: .env
    restart: on-failure
    command: bash entrypoint.sh
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 2GB
    depends_on:
      - db
      - qdrant
